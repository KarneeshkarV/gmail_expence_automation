<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #fafaf7;
  --surface:      #ffffff;
  --line:         #ececea;
  --line-strong:  #d8d8d4;

  --ink:          #1a1a1a;
  --ink-2:        #555550;
  --ink-3:        #8a8a85;
  --ink-4:        #b8b8b3;

  --accent:       #2563eb;
  --positive:     #16a34a;
  --warn:         #d97706;
  --negative:     #dc2626;

  --serif: 'Instrument Serif', Georgia, serif;
  --sans:  'Inter Tight', system-ui, sans-serif;
  --mono:  'JetBrains Mono', ui-monospace, monospace;

  --r: 8px;
}

html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}
::selection { background: var(--ink); color: var(--bg); }

/* ── Layout ──────────────────────────────────────── */
.shell { max-width: 1320px; margin: 0 auto; padding: 2rem 2rem 4rem; }
.grid { display: grid; gap: 1rem; }
.grid-2  { grid-template-columns: 1fr 1fr; }
.grid-3  { grid-template-columns: repeat(3, 1fr); }
.grid-4  { grid-template-columns: repeat(4, 1fr); }
.grid-12 { grid-template-columns: repeat(12, 1fr); }
@media (max-width: 1024px) {
  .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-12 > * { grid-column: span 6 !important; }
}
@media (max-width: 640px) {
  .shell { padding: 1.25rem; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .grid-12 > * { grid-column: 1 / -1 !important; }
}

/* ── Header ──────────────────────────────────────── */
.header {
  display: flex; justify-content: space-between; align-items: flex-end;
  padding-bottom: 1.5rem; margin-bottom: 2rem;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap; gap: 1rem;
}
.title {
  font-family: var(--serif);
  font-size: 2.4rem; font-weight: 400;
  letter-spacing: -.02em;
  line-height: 1;
}
.subtitle {
  color: var(--ink-3); font-size: .85rem; margin-top: .35rem;
}
.header-meta {
  text-align: right; font-family: var(--mono);
  font-size: .72rem; color: var(--ink-3);
  line-height: 1.7;
}
.header-meta strong { color: var(--ink); font-weight: 600; }
.header-meta .live {
  display: inline-flex; align-items: center; gap: .4rem;
  color: var(--positive); font-weight: 600;
}
.header-meta .live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--positive); animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Section heads ──────────────────────────────── */
.section { margin-top: 2rem; }
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem;
}
.section-title {
  font-family: var(--serif); font-size: 1.4rem; font-weight: 400;
  letter-spacing: -.015em;
}
.section-meta {
  font-family: var(--mono); font-size: .7rem;
  color: var(--ink-3); letter-spacing: .04em;
}

/* ── Card ────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 1.25rem;
}
.card-label {
  font-family: var(--mono);
  font-size: .68rem; font-weight: 500;
  letter-spacing: .04em;
  color: var(--ink-3);
  margin-bottom: 1rem;
  display: flex; justify-content: space-between; align-items: center; gap: .5rem;
}

/* ── Hero ────────────────────────────────────────── */
.hero {
  display: grid; grid-template-columns: 1.5fr 1fr;
  gap: 2rem; padding: 1.25rem 0 1.5rem;
}
@media (max-width: 900px) { .hero { grid-template-columns: 1fr; } .hero-side { border-left: none !important; padding-left: 0 !important; border-top: 1px solid var(--line); padding-top: 1.25rem; } }
.hero-context {
  font-family: var(--mono); font-size: .7rem;
  color: var(--ink-3); margin-bottom: .5rem;
  letter-spacing: .04em;
}
.hero-amount {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(3rem, 8vw, 5.5rem);
  line-height: 1; letter-spacing: -.04em;
  color: var(--ink);
}
.hero-amount .currency {
  font-size: .4em; vertical-align: top; margin-right: .15em;
  opacity: .5;
}
.hero-side {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1.25rem 1.5rem; align-content: start;
  border-left: 1px solid var(--line);
  padding-left: 1.5rem;
}
.hero-stat-label {
  font-family: var(--mono); font-size: .65rem;
  color: var(--ink-3); letter-spacing: .04em;
  margin-bottom: .25rem;
}
.hero-stat-value {
  font-family: var(--serif); font-weight: 400;
  font-size: 1.5rem; line-height: 1.1;
  letter-spacing: -.015em;
}
.delta-up { color: var(--negative); }
.delta-down { color: var(--positive); }

/* ── Stat tiles ──────────────────────────────────── */
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 1.1rem 1.2rem;
}
.tile-num {
  font-family: var(--serif); font-weight: 400;
  font-size: 1.9rem; line-height: 1; margin-top: .35rem;
  letter-spacing: -.02em;
}
.tile-foot {
  font-family: var(--mono); font-size: .65rem;
  color: var(--ink-3); margin-top: .55rem;
  letter-spacing: .04em;
}

/* ── Budget rows ─────────────────────────────────── */
.budget-row {
  display: grid;
  grid-template-columns: 110px 1fr 130px;
  align-items: center; gap: .85rem;
  padding: .55rem 0;
  border-bottom: 1px solid var(--line);
}
.budget-row:last-child { border-bottom: none; }
.budget-cat {
  font-size: .82rem; color: var(--ink); font-weight: 500;
}
.budget-track {
  height: 6px; background: var(--line);
  border-radius: 3px; overflow: hidden;
}
.budget-fill {
  height: 100%; border-radius: 3px;
  background: var(--positive);
  transition: width .8s cubic-bezier(.22,1,.36,1);
}
.budget-fill.warn { background: var(--warn); }
.budget-fill.over { background: var(--negative); }
.budget-nums {
  font-family: var(--mono); font-size: .7rem;
  text-align: right; color: var(--ink-3);
  font-variant-numeric: tabular-nums;
}
.budget-nums .actual { color: var(--ink); font-weight: 600; }

/* ── Charts ──────────────────────────────────────── */
.chart-container { position: relative; width: 100%; }
.chart-container.donut { max-width: 220px; margin: 0 auto; aspect-ratio: 1; }
.chart-container.tall { height: 300px; }

.donut-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; text-align: center;
}
.donut-center .num {
  font-family: var(--serif); font-weight: 400;
  font-size: 1.3rem; color: var(--ink); line-height: 1;
  letter-spacing: -.02em;
}
.donut-center .lbl {
  font-family: var(--mono); font-size: .58rem;
  color: var(--ink-3); margin-top: .25rem;
  letter-spacing: .04em;
}

/* ── Legend ──────────────────────────────────────── */
.legend { display: grid; grid-template-columns: 1fr 1fr; gap: .35rem .75rem; margin-top: 1rem; }
.legend-item {
  display: flex; align-items: center; gap: .5rem;
  font-size: .72rem; color: var(--ink-2);
}
.legend-dot { width: 8px; height: 8px; flex-shrink: 0; border-radius: 2px; }
.legend-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.legend-pct {
  font-family: var(--mono); color: var(--ink); font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* ── Merchants ───────────────────────────────────── */
.merchant-item {
  display: grid;
  grid-template-columns: 24px 1fr auto;
  align-items: baseline; gap: .75rem;
  padding: .55rem 0;
  border-bottom: 1px solid var(--line);
}
.merchant-item:last-child { border-bottom: none; }
.merchant-rank {
  font-family: var(--mono); font-size: .7rem;
  color: var(--ink-3); font-variant-numeric: tabular-nums;
}
.merchant-name {
  font-size: .85rem; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.merchant-meta {
  font-family: var(--mono); font-size: .62rem;
  color: var(--ink-3); margin-top: .15rem;
  letter-spacing: .04em;
}
.merchant-amount {
  font-family: var(--mono); font-size: .78rem; font-weight: 600;
  color: var(--ink); font-variant-numeric: tabular-nums;
}

/* ── Largest charge ──────────────────────────────── */
.biggest-amt {
  font-family: var(--serif); font-weight: 400;
  font-size: 2.4rem; line-height: 1;
  letter-spacing: -.025em; color: var(--ink);
  margin: .25rem 0 .5rem;
}
.biggest-merchant {
  font-size: .9rem; color: var(--ink); font-weight: 500;
  margin-bottom: .15rem;
}
.biggest-meta {
  font-family: var(--mono); font-size: .65rem;
  color: var(--ink-3); letter-spacing: .04em;
}

/* ── Calendar heatmap ────────────────────────────── */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: .5rem;
}
.cal-head {
  font-family: var(--mono); font-size: .58rem;
  color: var(--ink-4); text-align: center;
  padding-bottom: .25rem; letter-spacing: .04em;
}
.cal-day {
  aspect-ratio: 1;
  background: var(--line);
  border-radius: 3px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: .6rem;
  color: var(--ink-4);
  cursor: default;
  transition: transform .15s ease;
}
.cal-day:hover { transform: scale(1.15); z-index: 3; }
.cal-day.empty { background: transparent; pointer-events: none; }
.cal-day.l1 { background: rgba(37,99,235,.10); color: var(--ink-2); }
.cal-day.l2 { background: rgba(37,99,235,.25); color: var(--ink-2); }
.cal-day.l3 { background: rgba(37,99,235,.45); color: #fff; }
.cal-day.l4 { background: rgba(37,99,235,.65); color: #fff; }
.cal-day.l5 { background: var(--accent); color: #fff; }
.cal-day.today { box-shadow: 0 0 0 2px var(--ink); }

.cal-tip {
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #fff;
  padding: .35rem .55rem; border-radius: 4px;
  font-family: var(--mono); font-size: .62rem;
  white-space: nowrap; opacity: 0; pointer-events: none;
  transition: opacity .15s; z-index: 10;
}
.cal-day:hover .cal-tip { opacity: 1; }

.cal-scale {
  display: flex; align-items: center; gap: .3rem;
  font-family: var(--mono); font-size: .58rem;
  color: var(--ink-3); margin-top: .85rem;
  letter-spacing: .04em;
}
.scale-box { width: 12px; height: 12px; border-radius: 2px; }

/* ── Day of week ─────────────────────────────────── */
.dow-bars {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: .35rem; margin-top: .5rem; align-items: end;
  height: 130px;
}
.dow-col {
  display: flex; flex-direction: column; justify-content: end;
  align-items: center; gap: .3rem; height: 100%;
}
.dow-bar {
  width: 100%;
  background: var(--accent); opacity: .8;
  border-radius: 3px 3px 0 0;
  transition: height .8s cubic-bezier(.22,1,.36,1);
  min-height: 2px;
}
.dow-bar.peak { opacity: 1; background: var(--ink); }
.dow-label {
  font-family: var(--mono); font-size: .58rem;
  color: var(--ink-3); letter-spacing: .04em;
}
.dow-val {
  font-family: var(--mono); font-size: .55rem;
  color: var(--ink-4); font-variant-numeric: tabular-nums;
}

/* ── Recurring ───────────────────────────────────── */
.recurring-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 1rem; align-items: center;
  padding: .5rem 0;
  border-bottom: 1px solid var(--line);
}
.recurring-row:last-child { border-bottom: none; }
.rec-name {
  font-size: .82rem; color: var(--ink); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rec-cadence {
  font-family: var(--mono); font-size: .6rem;
  color: var(--ink-3); margin-top: .1rem; letter-spacing: .04em;
}
.rec-amt {
  font-family: var(--mono); font-size: .76rem; font-weight: 600;
  color: var(--ink); font-variant-numeric: tabular-nums;
}

.empty-note {
  color: var(--ink-3); font-size: .8rem;
  padding: .75rem 0; font-style: italic;
}

/* ── Ledger controls ─────────────────────────────── */
.ledger-controls {
  display: flex; gap: .85rem; align-items: center;
  margin-bottom: 1rem; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 220px;
  padding: .55rem .8rem;
  background: var(--bg);
  border: 1px solid var(--line-strong);
  border-radius: var(--r);
  color: var(--ink);
  font-family: var(--sans); font-size: .82rem;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.search-input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(26,26,26,.06);
}
.search-input::placeholder { color: var(--ink-3); }

.cat-filters {
  display: flex; gap: .3rem; flex-wrap: wrap;
}
.cat-pill {
  padding: .3rem .65rem;
  background: var(--bg);
  border: 1px solid var(--line-strong);
  border-radius: 100px;
  font-family: var(--mono); font-size: .62rem; font-weight: 500;
  color: var(--ink-2); cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: .03em;
}
.cat-pill:hover { border-color: var(--ink-3); color: var(--ink); }
.cat-pill.active {
  background: var(--ink); color: #fff; border-color: var(--ink);
}

/* ── Ledger table ────────────────────────────────── */
.ledger-table { width: 100%; border-collapse: collapse; }
.ledger-table thead { position: sticky; top: 0; z-index: 2; background: var(--surface); }
.ledger-table thead tr { border-bottom: 1px solid var(--line-strong); }
.ledger-table th {
  text-align: left; padding: .65rem .5rem;
  font-family: var(--mono); font-size: .65rem; font-weight: 500;
  color: var(--ink-3); letter-spacing: .04em;
}
.ledger-table th.right { text-align: right; }
.ledger-table tbody tr {
  border-bottom: 1px solid var(--line);
  transition: background .12s;
}
.ledger-table tbody tr:hover { background: var(--bg); }
.ledger-table td { padding: .65rem .5rem; vertical-align: baseline; }
.ledger-table td.date {
  font-family: var(--mono); font-size: .72rem; color: var(--ink-3);
  white-space: nowrap; font-variant-numeric: tabular-nums;
}
.ledger-table td.merchant {
  font-size: .85rem; color: var(--ink);
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ledger-table td.mode {
  font-family: var(--mono); font-size: .65rem;
  color: var(--ink-3); letter-spacing: .04em;
}
.ledger-table td.amt {
  font-family: var(--mono); font-size: .82rem;
  text-align: right; font-weight: 600;
  font-variant-numeric: tabular-nums; color: var(--ink);
}

.cat-tag {
  display: inline-flex; align-items: center; gap: .4rem;
  font-family: var(--mono); font-size: .65rem;
  color: var(--ink-2); letter-spacing: .02em;
}
.cat-tag .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.table-wrap {
  max-height: 540px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent;
}
.table-wrap::-webkit-scrollbar { width: 6px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

/* ── Footer ──────────────────────────────────────── */
.footer {
  margin-top: 3rem; padding-top: 1.25rem;
  border-top: 1px solid var(--line);
  text-align: center;
  font-family: var(--mono); font-size: .65rem;
  color: var(--ink-3); letter-spacing: .04em;
}

/* ── Reveal ──────────────────────────────────────── */
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.reveal { animation: fade .5s cubic-bezier(.22,1,.36,1) both; }
.reveal-1 { animation-delay: .04s; }
.reveal-2 { animation-delay: .10s; }
.reveal-3 { animation-delay: .16s; }
.reveal-4 { animation-delay: .22s; }
.reveal-5 { animation-delay: .28s; }

/* ── Error ───────────────────────────────────────── */
.error-state { text-align: center; padding: 5rem 2rem; }
.error-state h2 {
  font-family: var(--serif); font-size: 2.4rem; font-weight: 400;
  color: var(--negative); letter-spacing: -.02em;
}
.error-state p { color: var(--ink-3); margin-top: .8rem; font-size: .85rem; }
.error-state code { background: var(--surface); padding: .2rem .45rem; border-radius: 4px; border: 1px solid var(--line); font-family: var(--mono); }
</style>
</head>
<body>
<div class="shell" id="app"></div>

<template id="dashboard-template">
  <!-- Header -->
  <header class="header reveal reveal-1">
    <div>
      <div class="title">Expense Dashboard</div>
      <div class="subtitle" data-bind="dateLong"></div>
    </div>
    <div class="header-meta">
      <div><span class="live">Live</span> · synced <span data-bind="syncTime"></span></div>
      <div><strong data-bind="txnCount"></strong> transactions · <strong data-bind="monthCount"></strong> months</div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero reveal reveal-2">
    <div>
      <div class="hero-context">This month · <span data-bind="currentMonth"></span></div>
      <div class="hero-amount"><span class="currency">₹</span><span data-bind="heroAmount"></span></div>
    </div>
    <div class="hero-side">
      <div>
        <div class="hero-stat-label">vs last month</div>
        <div class="hero-stat-value" data-bind="vsLast"></div>
      </div>
      <div>
        <div class="hero-stat-label">projected</div>
        <div class="hero-stat-value" data-bind="projected"></div>
      </div>
      <div>
        <div class="hero-stat-label">daily pace</div>
        <div class="hero-stat-value" data-bind="dailyPace"></div>
      </div>
      <div>
        <div class="hero-stat-label">days remaining</div>
        <div class="hero-stat-value" data-bind="daysLeft"></div>
      </div>
    </div>
  </section>

  <!-- Stat tiles -->
  <div class="grid grid-4 reveal reveal-3">
    <div class="stat-tile">
      <div class="card-label">All-time spend</div>
      <div class="tile-num"><span data-bind="allTimeSpend"></span></div>
      <div class="tile-foot"><span data-bind="monthsTracked"></span></div>
    </div>
    <div class="stat-tile">
      <div class="card-label">Monthly average</div>
      <div class="tile-num"><span data-bind="monthlyAvg"></span></div>
      <div class="tile-foot"><span data-bind="yearRunRate"></span></div>
    </div>
    <div class="stat-tile">
      <div class="card-label">Over budget</div>
      <div class="tile-num"><span data-bind="overCount"></span></div>
      <div class="tile-foot"><span data-bind="overFoot"></span></div>
    </div>
    <div class="stat-tile">
      <div class="card-label">Saved this month</div>
      <div class="tile-num"><span data-bind="investedAmt"></span></div>
      <div class="tile-foot"><span data-bind="savingsRate"></span></div>
    </div>
  </div>

  <!-- Composition -->
  <section class="section reveal reveal-4">
    <div class="section-head">
      <div class="section-title">Composition</div>
      <div class="section-meta" data-bind="compMonth"></div>
    </div>
    <div class="grid grid-12">
      <div class="card" style="grid-column: span 4">
        <div class="card-label">By category</div>
        <div class="chart-container donut">
          <canvas id="donutChart"></canvas>
          <div class="donut-center">
            <div class="num" id="donutTotal">—</div>
            <div class="lbl">total</div>
          </div>
        </div>
        <div class="legend" id="donutLegend"></div>
      </div>
      <div class="card" style="grid-column: span 5">
        <div class="card-label"><span>Budget allocation</span><span data-bind="budgetMonth"></span></div>
        <div id="budgetBars"></div>
      </div>
      <div class="card" style="grid-column: span 3">
        <div class="card-label">Largest charge</div>
        <div id="biggestTxn"></div>
      </div>
    </div>
  </section>

  <!-- Patterns -->
  <section class="section reveal reveal-5">
    <div class="section-head">
      <div class="section-title">Patterns</div>
    </div>
    <div class="grid grid-12">
      <div class="card" style="grid-column: span 6">
        <div class="card-label"><span>Daily activity</span><span data-bind="calMonth"></span></div>
        <div class="cal-grid">
          <div class="cal-head">Mon</div><div class="cal-head">Tue</div><div class="cal-head">Wed</div>
          <div class="cal-head">Thu</div><div class="cal-head">Fri</div><div class="cal-head">Sat</div>
          <div class="cal-head">Sun</div>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
        <div class="cal-scale">
          <span>Quiet</span>
          <span class="scale-box" style="background:var(--line)"></span>
          <span class="scale-box" style="background:rgba(37,99,235,.10)"></span>
          <span class="scale-box" style="background:rgba(37,99,235,.25)"></span>
          <span class="scale-box" style="background:rgba(37,99,235,.45)"></span>
          <span class="scale-box" style="background:rgba(37,99,235,.65)"></span>
          <span class="scale-box" style="background:var(--accent)"></span>
          <span>Heavy</span>
        </div>
      </div>
      <div class="card" style="grid-column: span 3">
        <div class="card-label">By weekday</div>
        <div class="dow-bars" id="dowBars"></div>
        <div class="tile-foot" style="margin-top:.6rem">Average per day</div>
      </div>
      <div class="card" style="grid-column: span 3">
        <div class="card-label">Recurring</div>
        <div id="recurringList"></div>
      </div>
    </div>
  </section>

  <!-- Trends -->
  <section class="section">
    <div class="section-head">
      <div class="section-title">Trends</div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-label">Monthly composition</div>
        <div class="chart-container tall"><canvas id="monthlyChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-label">Top merchants this month</div>
        <div id="merchantList"></div>
      </div>
    </div>
    <div class="card" style="margin-top:1rem">
      <div class="card-label">Category trajectories</div>
      <div class="chart-container tall"><canvas id="trendChart"></canvas></div>
    </div>
  </section>

  <!-- Transactions -->
  <section class="section">
    <div class="section-head">
      <div class="section-title">Transactions</div>
    </div>
    <div class="card">
      <div class="ledger-controls">
        <input class="search-input" type="text" id="txnSearch" placeholder="Search merchant, category, date…">
        <div class="cat-filters" id="catFilters"></div>
      </div>
      <div class="table-wrap">
        <table class="ledger-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Merchant</th>
              <th>Category</th>
              <th>Mode</th>
              <th class="right">Amount</th>
            </tr>
          </thead>
          <tbody id="txnBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="footer">
    Refreshed via gog cli + hdfc sync · all sums in INR
  </footer>
</template>

<script>
const DATA_PATH = 'dashboard_data.json';

const CAT_COLORS = {
  Food:           '#f59e0b',
  Shopping:       '#a855f7',
  Transport:      '#3b82f6',
  Subscriptions:  '#ec4899',
  Medical:        '#ef4444',
  Rent:           '#06b6d4',
  Investment:     '#10b981',
  Entertainment:  '#f97316',
  Groceries:      '#84cc16',
  Fuel:           '#6b7280',
  'Personal Transfer': '#14b8a6',
  Uncategorized:  '#9ca3af',
};
const catColor = c => CAT_COLORS[c] || '#9ca3af';

const CK = {
  ink: '#1a1a1a', ink2: '#555550', ink3: '#8a8a85',
  line: '#ececea', surface: '#ffffff',
};
const FMONO = "JetBrains Mono, monospace";

const fmt = n => '₹' + Math.round(n || 0).toLocaleString('en-IN');
const fmtShort = n => {
  if (!n) return '₹0';
  if (n >= 1e7)  return '₹' + (n/1e7).toFixed(1) + 'Cr';
  if (n >= 1e5)  return '₹' + (n/1e5).toFixed(1) + 'L';
  if (n >= 1000) return '₹' + (n/1000).toFixed(1) + 'k';
  return '₹' + Math.round(n);
};

let DATA = null;
let charts = {};
let activeCategory = 'All';

const app = document.getElementById('app');
const tpl = document.getElementById('dashboard-template');

function renderError(msg) {
  app.innerHTML = `
    <div class="error-state">
      <h2>Data unavailable</h2>
      <p>${msg}</p>
      <p style="margin-top:.6rem">Run <code>python3 export_dashboard_data.py</code> to refresh.</p>
    </div>`;
}

fetch(DATA_PATH)
  .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
  .then(d => { DATA = d; mount(); })
  .catch(e => renderError(e.message));

function mount() {
  app.appendChild(tpl.content.cloneNode(true));
  renderHero();
  renderStatTiles();
  renderDonut();
  renderBudget();
  renderBiggest();
  renderCalendar();
  renderDayOfWeek();
  renderRecurring();
  renderMonthly();
  renderMerchants();
  renderTrends();
  renderCatFilters();
  renderTable();
  setupSearch();
}

const setBind = (key, val) => {
  document.querySelectorAll(`[data-bind="${key}"]`).forEach(el => el.textContent = val);
};

function latestYM() {
  const months = new Set();
  for (const t of DATA.transactions || []) {
    if (t.date && t.date.length >= 7) months.add(t.date.slice(0, 7));
  }
  const sorted = [...months].sort();
  return sorted[sorted.length - 1] || null;
}

// Hero
function renderHero() {
  const mb = DATA.monthly_breakdown || [];
  const current = mb[mb.length - 1] || {};
  const prev = mb.length >= 2 ? mb[mb.length - 2] : null;
  const currentTotal = current.total || 0;

  const ym = latestYM();
  const today = new Date();
  const [yr, mo] = ym ? ym.split('-').map(Number) : [today.getFullYear(), today.getMonth() + 1];
  const isCurrentMonth = today.getFullYear() === yr && today.getMonth() === mo - 1;
  const day = isCurrentMonth ? today.getDate() : new Date(yr, mo, 0).getDate();
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const daysLeft = isCurrentMonth ? Math.max(daysInMonth - day, 0) : 0;
  const dailyPace = day > 0 ? currentTotal / day : 0;
  const projected = isCurrentMonth ? dailyPace * daysInMonth : currentTotal;

  setBind('dateLong', today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' }));
  setBind('syncTime', (DATA.generated_at || '').slice(11,16) || '—');
  setBind('txnCount', (DATA.transaction_count || 0).toLocaleString('en-IN'));
  setBind('monthCount', (DATA.months || []).length);
  setBind('currentMonth', current.month || '—');
  setBind('heroAmount', Math.round(currentTotal).toLocaleString('en-IN'));

  if (prev && prev.total) {
    const diff = currentTotal - prev.total;
    const pct = (diff / prev.total) * 100;
    const arrow = diff >= 0 ? '↑' : '↓';
    const cls = diff >= 0 ? 'delta-up' : 'delta-down';
    document.querySelector('[data-bind="vsLast"]').innerHTML =
      `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`;
  } else {
    setBind('vsLast', '—');
  }

  setBind('projected', fmtShort(projected));
  setBind('dailyPace', fmtShort(dailyPace) + '/d');
  setBind('daysLeft', isCurrentMonth ? `${daysLeft} of ${daysInMonth}` : 'closed');

  setBind('compMonth', current.month || '');
  setBind('budgetMonth', current.month || '');
  setBind('calMonth', current.month || '');
}

// Stat tiles
function renderStatTiles() {
  const months = DATA.months || [];
  const mb = DATA.monthly_breakdown || [];
  const current = mb[mb.length - 1] || {};
  const totalSpend = Object.values(DATA.category_totals || {}).reduce((a,b) => a + b, 0);
  const monthlyAvg = totalSpend / Math.max(months.length, 1);

  let overCount = 0, withinCount = 0;
  for (const [cat, budget] of Object.entries(DATA.budget || {})) {
    if ((current[cat] || 0) > budget) overCount++; else withinCount++;
  }

  const investedAll = (DATA.category_totals || {})['Investment'] || 0;
  const investedMonth = current['Investment'] || 0;
  const savingsRate = totalSpend > 0 ? ((investedAll / totalSpend) * 100).toFixed(0) : 0;

  setBind('allTimeSpend',  fmtShort(totalSpend));
  setBind('monthsTracked', `across ${months.length} months`);
  setBind('monthlyAvg',    fmtShort(monthlyAvg));
  setBind('yearRunRate',   `${fmtShort(monthlyAvg * 12)} annualised`);
  setBind('overCount',     `${overCount}`);
  setBind('overFoot',      `${withinCount} within plan`);
  setBind('investedAmt',   fmtShort(investedMonth));
  setBind('savingsRate',   `${savingsRate}% lifetime savings rate`);
}

// Donut
function renderDonut() {
  const mb = DATA.monthly_breakdown || [];
  const source = mb[mb.length - 1] || {};
  const cats = (DATA.categories || [])
    .filter(c => (source[c] || 0) > 0)
    .map(c => ({ cat: c, val: source[c] || 0 }))
    .sort((a, b) => b.val - a.val);

  const total = cats.reduce((s, c) => s + c.val, 0);
  document.getElementById('donutTotal').textContent = fmtShort(total);

  if (charts.donut) charts.donut.destroy();
  charts.donut = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: cats.map(c => c.cat),
      datasets: [{
        data: cats.map(c => c.val),
        backgroundColor: cats.map(c => catColor(c.cat)),
        borderWidth: 2, borderColor: CK.surface, hoverOffset: 6,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '70%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: CK.ink, titleColor: '#fff', bodyColor: '#fff',
          borderWidth: 0, padding: 10,
          titleFont: { family: FMONO, size: 11 }, bodyFont: { family: FMONO, size: 11 },
          callbacks: { label: c => `${c.label}: ${fmt(c.parsed)} (${((c.parsed / total) * 100).toFixed(0)}%)` },
        },
      },
    },
  });

  document.getElementById('donutLegend').innerHTML = cats.slice(0, 8).map(c => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${catColor(c.cat)}"></span>
      <span class="legend-name">${c.cat}</span>
      <span class="legend-pct">${((c.val / total) * 100).toFixed(0)}%</span>
    </div>`).join('');
}

// Budget
function renderBudget() {
  const current = (DATA.monthly_breakdown || []).slice(-1)[0] || {};
  const entries = Object.entries(DATA.budget || {})
    .map(([cat, budget]) => ({ cat, budget, actual: current[cat] || 0 }))
    .sort((a, b) => (b.actual / Math.max(b.budget, 1)) - (a.actual / Math.max(a.budget, 1)));

  document.getElementById('budgetBars').innerHTML = entries.map(e => {
    const ratio = e.budget > 0 ? e.actual / e.budget : 0;
    const cls = ratio > 1 ? 'over' : ratio > 0.85 ? 'warn' : '';
    const fillPct = Math.min(ratio * 100, 100);
    return `
      <div class="budget-row">
        <div class="budget-cat">${e.cat}</div>
        <div class="budget-track"><div class="budget-fill ${cls}" style="width:${fillPct}%"></div></div>
        <div class="budget-nums"><span class="actual">${fmtShort(e.actual)}</span> / ${fmtShort(e.budget)}</div>
      </div>`;
  }).join('');
}

// Largest charge
function renderBiggest() {
  const ym = latestYM();
  const monthTxns = (DATA.transactions || []).filter(t => t.date && t.date.startsWith(ym || ''));
  const list = monthTxns.length > 0 ? monthTxns : (DATA.transactions || []);
  const biggest = list.reduce((max, t) => (t.amount || 0) > (max.amount || 0) ? t : max, { amount: 0 });
  const dateStr = biggest.date
    ? new Date(biggest.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
    : '—';

  document.getElementById('biggestTxn').innerHTML = `
    <div class="biggest-amt">${fmt(biggest.amount || 0)}</div>
    <div class="biggest-merchant" title="${biggest.merchant || ''}">${biggest.merchant || '—'}</div>
    <div class="biggest-meta">${dateStr} · ${biggest.category || ''}</div>
  `;
}

// Calendar
function renderCalendar() {
  const ym = latestYM();
  if (!ym) return;
  const [yr, mo] = ym.split('-').map(Number);

  const monthTxns = (DATA.transactions || []).filter(t => t.date && t.date.startsWith(ym));
  const byDay = {};
  for (const t of monthTxns) {
    const day = parseInt(t.date.slice(8, 10), 10);
    if (!isNaN(day)) byDay[day] = (byDay[day] || 0) + (t.amount || 0);
  }
  const maxDay = Math.max(...Object.values(byDay), 1);

  const daysInMonth = new Date(yr, mo, 0).getDate();
  const firstDay = new Date(yr, mo - 1, 1).getDay();
  const startOffset = (firstDay + 6) % 7;
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === yr && today.getMonth() === mo - 1;
  const monName = new Date(yr, mo - 1, 1).toLocaleString('en-US', { month: 'short' });

  let html = '';
  for (let i = 0; i < startOffset; i++) html += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const amt = byDay[d] || 0;
    let cls = '';
    if (amt > 0) {
      const r = amt / maxDay;
      cls = r > 0.8 ? 'l5' : r > 0.6 ? 'l4' : r > 0.4 ? 'l3' : r > 0.2 ? 'l2' : 'l1';
    }
    if (isCurrentMonth && today.getDate() === d) cls += ' today';
    const tip = amt > 0 ? `${fmt(amt)} · ${d} ${monName}` : `Quiet · ${d} ${monName}`;
    html += `<div class="cal-day ${cls}">${d}<span class="cal-tip">${tip}</span></div>`;
  }
  document.getElementById('calendarGrid').innerHTML = html;
}

// Day of week
function renderDayOfWeek() {
  const sums = [0,0,0,0,0,0,0];
  const counts = [0,0,0,0,0,0,0];
  for (const t of DATA.transactions || []) {
    const d = new Date(t.date);
    if (isNaN(d)) continue;
    const idx = (d.getDay() + 6) % 7;
    sums[idx] += t.amount || 0;
    counts[idx] += 1;
  }
  const avgs = sums.map((s, i) => counts[i] ? s / counts[i] : 0);
  const max = Math.max(...avgs, 1);
  const peakIdx = avgs.indexOf(max);
  const labels = ['M','T','W','T','F','S','S'];

  document.getElementById('dowBars').innerHTML = labels.map((lbl, i) => {
    const h = (avgs[i] / max) * 100;
    return `
      <div class="dow-col">
        <div class="dow-val">${avgs[i] > 0 ? fmtShort(avgs[i]) : '—'}</div>
        <div class="dow-bar ${i === peakIdx ? 'peak' : ''}" style="height:${h}%"></div>
        <div class="dow-label">${lbl}</div>
      </div>`;
  }).join('');
}

// Recurring
function renderRecurring() {
  const monthByMerchant = {}, totalByMerchant = {};
  for (const t of DATA.transactions || []) {
    if (!t.merchant) continue;
    const ym = (t.date || '').slice(0, 7);
    if (!ym) continue;
    monthByMerchant[t.merchant] = monthByMerchant[t.merchant] || new Set();
    monthByMerchant[t.merchant].add(ym);
    totalByMerchant[t.merchant] = (totalByMerchant[t.merchant] || 0) + (t.amount || 0);
  }
  const recurring = Object.entries(monthByMerchant)
    .filter(([_, set]) => set.size >= 3)
    .map(([m, set]) => ({ name: m, months: set.size, avg: totalByMerchant[m] / set.size }))
    .sort((a, b) => b.months - a.months || b.avg - a.avg)
    .slice(0, 6);

  const container = document.getElementById('recurringList');
  if (recurring.length === 0) {
    container.innerHTML = '<div class="empty-note">None detected.</div>';
    return;
  }
  container.innerHTML = recurring.map(r => `
    <div class="recurring-row">
      <div>
        <div class="rec-name" title="${r.name}">${r.name}</div>
        <div class="rec-cadence">${r.months} months</div>
      </div>
      <div class="rec-amt">${fmtShort(r.avg)}</div>
    </div>`).join('');
}

// Monthly stacked
function renderMonthly() {
  const ctx = document.getElementById('monthlyChart').getContext('2d');
  const topCats = (DATA.categories || []).slice(0, 8);
  const datasets = topCats.map(cat => ({
    label: cat,
    data: (DATA.monthly_breakdown || []).map(m => m[cat] || 0),
    backgroundColor: catColor(cat),
    borderRadius: 3, borderSkipped: false, borderWidth: 0,
  }));

  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(ctx, {
    type: 'bar',
    data: { labels: DATA.months || [], datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked: true, grid: { display: false }, border: { color: CK.line },
             ticks: { color: CK.ink3, font: { family: FMONO, size: 10 } } },
        y: { stacked: true, grid: { color: CK.line, drawTicks: false }, border: { display: false },
             ticks: { color: CK.ink3, callback: v => v >= 1000 ? (v / 1000) + 'k' : v,
                      font: { family: FMONO, size: 10 } } },
      },
      plugins: {
        legend: { position: 'bottom',
          labels: { color: CK.ink2, font: { family: FMONO, size: 10 },
                    boxWidth: 10, boxHeight: 10, padding: 12, usePointStyle: true, pointStyle: 'rectRounded' } },
        tooltip: { mode: 'index', backgroundColor: CK.ink,
          titleColor: '#fff', bodyColor: '#fff', borderWidth: 0,
          titleFont: { family: FMONO, size: 11 }, bodyFont: { family: FMONO, size: 11 },
          callbacks: { label: c => `${c.dataset.label}: ${fmt(c.parsed.y)}` } },
      },
    },
  });
}

// Top merchants
function renderMerchants() {
  const container = document.getElementById('merchantList');
  const ym = latestYM();
  const tally = {}, txCount = {};
  for (const t of DATA.transactions || []) {
    if (!t.date || !t.date.startsWith(ym || '')) continue;
    tally[t.merchant] = (tally[t.merchant] || 0) + (t.amount || 0);
    txCount[t.merchant] = (txCount[t.merchant] || 0) + 1;
  }
  const top = Object.entries(tally)
    .map(([name, total]) => ({ name, total, count: txCount[name] }))
    .sort((a, b) => b.total - a.total)
    .slice(0, 10);

  if (top.length === 0) {
    container.innerHTML = '<div class="empty-note">No transactions in current month yet.</div>';
    return;
  }
  container.innerHTML = top.map((m, i) => `
    <div class="merchant-item">
      <div class="merchant-rank">${String(i + 1).padStart(2, '0')}</div>
      <div>
        <div class="merchant-name" title="${m.name}">${m.name}</div>
        <div class="merchant-meta">${m.count} ${m.count === 1 ? 'visit' : 'visits'}</div>
      </div>
      <div class="merchant-amount">${fmt(m.total)}</div>
    </div>`).join('');
}

// Trends
function renderTrends() {
  const ctx = document.getElementById('trendChart').getContext('2d');
  const topCats = (DATA.categories || []).slice(0, 6);
  const datasets = topCats.map(cat => ({
    label: cat,
    data: (DATA.monthly_breakdown || []).map(m => m[cat] || 0),
    borderColor: catColor(cat),
    backgroundColor: catColor(cat) + '15',
    tension: .35, fill: false,
    pointRadius: 3, pointHoverRadius: 6, borderWidth: 2,
    pointBackgroundColor: catColor(cat),
    pointBorderColor: CK.surface, pointBorderWidth: 1.5,
  }));

  if (charts.trend) charts.trend.destroy();
  charts.trend = new Chart(ctx, {
    type: 'line',
    data: { labels: DATA.months || [], datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { grid: { display: false }, border: { color: CK.line },
             ticks: { color: CK.ink3, font: { family: FMONO, size: 10 } } },
        y: { grid: { color: CK.line, drawTicks: false }, border: { display: false },
             ticks: { color: CK.ink3, callback: v => v >= 1000 ? (v / 1000) + 'k' : v,
                      font: { family: FMONO, size: 10 } } },
      },
      plugins: {
        legend: { position: 'bottom',
          labels: { color: CK.ink2, font: { family: FMONO, size: 10 },
                    boxWidth: 14, boxHeight: 2, padding: 16, usePointStyle: false } },
        tooltip: { backgroundColor: CK.ink,
          titleColor: '#fff', bodyColor: '#fff', borderWidth: 0,
          titleFont: { family: FMONO, size: 11 }, bodyFont: { family: FMONO, size: 11 },
          callbacks: { label: c => `${c.dataset.label}: ${fmt(c.parsed.y)}` } },
      },
    },
  });
}

// Filters
function renderCatFilters() {
  const cats = ['All', ...(DATA.categories || [])];
  const container = document.getElementById('catFilters');
  container.innerHTML = cats.map(c =>
    `<button class="cat-pill ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  container.querySelectorAll('.cat-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      container.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b === btn));
      renderTable(document.getElementById('txnSearch').value);
    });
  });
}

// Table
function renderTable(filter = '') {
  const tbody = document.getElementById('txnBody');
  const q = filter.toLowerCase();
  const rows = (DATA.transactions || [])
    .filter(t => activeCategory === 'All' || t.category === activeCategory)
    .filter(t => !q ||
      (t.merchant || '').toLowerCase().includes(q) ||
      (t.category || '').toLowerCase().includes(q) ||
      (t.date || '').includes(q))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  const slice = rows.slice(0, 200);
  tbody.innerHTML = slice.map(t => {
    const dateStr = t.date
      ? new Date(t.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' })
      : '—';
    const dot = catColor(t.category);
    return `
      <tr>
        <td class="date">${dateStr}</td>
        <td class="merchant" title="${t.merchant}">${t.merchant}</td>
        <td><span class="cat-tag"><span class="dot" style="background:${dot}"></span>${t.category}</span></td>
        <td class="mode">${t.mode || ''}</td>
        <td class="amt">${fmt(t.amount)}</td>
      </tr>`;
  }).join('');

  if (rows.length > 200) {
    tbody.innerHTML += `
      <tr><td colspan="5" style="text-align:center;color:var(--ink-3);padding:1rem;font-size:.78rem">
        Showing 200 of ${rows.length}. Refine the search.
      </td></tr>`;
  }
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--ink-3);padding:2rem;font-size:.78rem">
      No matching entries.</td></tr>`;
  }
}

function setupSearch() {
  let to;
  document.getElementById('txnSearch').addEventListener('input', e => {
    clearTimeout(to);
    to = setTimeout(() => renderTable(e.target.value), 180);
  });
}
</script>
</body>
